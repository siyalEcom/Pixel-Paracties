<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Store</title>

<!-- Meta Pixel Code -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',

</head>
<body style="font-family: Arial, sans-serif; text-align:center; margin-top:50px;">

    <h1>Welcome to My Store</h1>
    <p>Check out our amazing products at unbeatable prices!</p>

    <button onclick="trackPurchase()" style="padding:12px 24px; font-size:16px; background-color:#1877f2; color:white; border:none; border-radius:6px; cursor:pointer;">
        Buy Now
    </button>

    <script>
    function trackPurchase() {
        // Purchase event track karega
        fbq('track', 'Purchase', {
            value: 20.00,      // apni product ki actual price yahan daalein
            currency: 'USD'    // apni currency yahan set karein (e.g. PKR)
        });

        // Yahan aap redirect ya thank-you message add kar sakte hain
        alert('Thank you for your purchase!');
    }
    </script>

</body>
</html>
